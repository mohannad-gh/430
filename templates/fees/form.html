{% extends 'base.html' %}
{% block title %}Create Fee — VolleyLB{% endblock %}
{% block content %}
<div class="topbar">
  <div><a href="{% url 'fees_list' %}" class="text-muted" style="font-size:0.85rem">← Back</a>
  <div class="page-title">Create <span>Fee</span></div></div>
</div>
<div class="card" style="max-width:560px">
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label>Fee Name</label><input type="text" name="name" required placeholder="e.g. Spring Season Registration"></div>
    <div class="grid-2">
      <div class="form-group"><label>Amount ($)</label><input type="number" name="amount" required min="0" step="0.01" placeholder="0.00"></div>
      <div class="form-group"><label>Late Fee Amount ($)</label><input type="number" name="late_fee_amount" min="0" step="0.01" placeholder="0.00" value="0"></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Payment Deadline</label><input type="date" name="deadline" required></div>
      <div class="form-group">
        <label>Team (optional)</label>
        <select name="team">
          <option value="">— All / Assign manually —</option>
          {% for t in teams %}<option value="{{ t.pk }}">{{ t.name }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div style="display:flex;gap:0.75rem">
      <button type="submit" class="btn btn-primary">Create Fee</button>
      <a href="{% url 'fees_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
