{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:480px">
  <div class="card-title" style="font-size:1.4rem;margin-bottom:1rem">🗑️ Delete Team</div>
  <p class="text-muted mb-2">Are you sure you want to delete <strong style="color:var(--text-white)">{{ team.name }}</strong>? This cannot be undone.</p>
  <form method="post" style="display:flex;gap:0.75rem">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete Team</button>
    <a href="{% url 'team_detail' team.pk %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
