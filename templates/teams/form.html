{% extends 'base.html' %}
{% block title %}{{ action }} Team — VolleyLB{% endblock %}
{% block content %}
<div class="topbar">
  <div><a href="{% url 'teams_list' %}" class="text-muted" style="font-size:0.85rem">← Back</a><div class="page-title">{{ action }} <span>Team</span></div></div>
</div>
<div class="card" style="max-width:560px">
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label>Team Name</label><input type="text" name="name" value="{{ team.name|default:'' }}" required placeholder="e.g. Beirut Eagles"></div>
    <div class="form-group"><label>Description</label><textarea name="description" placeholder="Optional team description">{{ team.description|default:'' }}</textarea></div>
    <div style="display:flex;gap:0.75rem">
      <button type="submit" class="btn btn-primary">{{ action }} Team</button>
      <a href="{% url 'teams_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
