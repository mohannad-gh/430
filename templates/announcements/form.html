{% extends 'base.html' %}
{% block title %}Post Announcement — VolleyLB{% endblock %}
{% block content %}
<div class="topbar">
  <div><a href="{% url 'announcements_list' %}" class="text-muted" style="font-size:0.85rem">← Back</a>
  <div class="page-title">Post <span>Announcement</span></div></div>
</div>
<div class="card" style="max-width:620px">
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label>Title</label><input type="text" name="title" required placeholder="Announcement title"></div>
    <div class="form-group"><label>Message</label><textarea name="content" required style="min-height:150px" placeholder="Write your announcement here..."></textarea></div>
    <div class="grid-2">
      <div class="form-group">
        <label>Scope</label>
        <select name="scope" onchange="document.getElementById('team-group').style.display=this.value=='team'?'block':'none'">
          {% if role == 'coordinator' %}<option value="club">📣 Club-wide (all teams)</option>{% endif %}
          <option value="team" {% if role == 'coach' %}selected{% endif %}>👥 Specific Team</option>
        </select>
      </div>
      <div class="form-group" id="team-group" {% if role == 'coordinator' %}style="display:none"{% endif %}>
        <label>Team</label>
        <select name="team">
          <option value="">— Select Team —</option>
          {% for t in teams %}<option value="{{ t.pk }}">{{ t.name }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div style="display:flex;gap:0.75rem">
      <button type="submit" class="btn btn-primary">📢 Post Announcement</button>
      <a href="{% url 'announcements_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
