<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolleyLB — Register</title>
{% load static %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:480px">
    <div class="auth-logo">
      <div class="auth-logo-circle">🏐</div>
      <div class="auth-logo-name">Volley<span>LB</span></div>
    </div>
    {% if messages %}{% for msg in messages %}
      <div class="alert alert-error">❌ {{ msg }}</div>
    {% endfor %}{% endif %}
    <div class="auth-title">Create Account</div>
    <form method="post">
      {% csrf_token %}
      <div class="grid-2">
        <div class="form-group"><label>First Name</label><input type="text" name="first_name" placeholder="First name"></div>
        <div class="form-group"><label>Last Name</label><input type="text" name="last_name" placeholder="Last name"></div>
      </div>
      <div class="form-group"><label>Username</label><input type="text" name="username" placeholder="Choose a username" required></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="your@email.com"></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Choose a password" required></div>
      <div class="form-group">
        <label>Role</label>
        <select name="role">
          <option value="player">Player</option>
          <option value="coach">Coach</option>
          <option value="coordinator">Coordinator</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:0.85rem;">✅ Create Account</button>
    </form>
    <div class="divider"></div>
    <p class="text-muted" style="text-align:center">Have an account? <a href="{% url 'login' %}" style="color:var(--orange)">Sign in</a></p>
  </div>
</div>
</body>
</html>
