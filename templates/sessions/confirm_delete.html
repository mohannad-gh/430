{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:480px">
  <div class="card-title" style="font-size:1.4rem;margin-bottom:1rem">🗑️ Delete Session</div>
  <p class="text-muted mb-2">Delete <strong style="color:var(--text-white)">{{ session.title }}</strong> on {{ session.date|date:"M d, Y" }}?</p>
  <form method="post" style="display:flex;gap:0.75rem">{% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'session_detail' session.pk %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
