{% extends 'base.html' %}
{% block title %}{{ action }} Session — VolleyLB{% endblock %}
{% block content %}
<div class="topbar">
  <div><a href="{% url 'sessions_list' %}" class="text-muted" style="font-size:0.85rem">← Back to Sessions</a>
  <div class="page-title">{{ action }} <span>Session</span></div></div>
</div>
<div class="card" style="max-width:640px">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Team</label>
      <select name="team" required>
        {% for t in teams %}<option value="{{ t.pk }}" {% if session.team_id == t.pk %}selected{% endif %}>{{ t.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Session Title</label>
      <input type="text" name="title" value="{{ session.title|default:'' }}" required placeholder="e.g. Morning Training">
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>Type</label>
        <select name="session_type">
          <option value="training" {% if session.session_type == 'training' %}selected{% endif %}>Training</option>
          <option value="match" {% if session.session_type == 'match' %}selected{% endif %}>Match</option>
        </select>
      </div>
      <div class="form-group">
        <label>Court / Venue</label>
        <select name="court">
          <option value="">— TBD —</option>
          {% for c in courts %}<option value="{{ c.pk }}" {% if session.court_id == c.pk %}selected{% endif %}>{{ c.name }} ({{ c.court_type }})</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Date</label><input type="date" name="date" value="{{ session.date|date:'Y-m-d'|default:'' }}" required></div>
      <div class="form-group"><label>Opponent (if match)</label><input type="text" name="opponent" value="{{ session.opponent|default:'' }}" placeholder="Opposing team"></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Start Time</label><input type="time" name="start_time" value="{{ session.start_time|time:'H:i'|default:'' }}" required></div>
      <div class="form-group"><label>End Time</label><input type="time" name="end_time" value="{{ session.end_time|time:'H:i'|default:'' }}" required></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea name="notes" placeholder="Optional notes">{{ session.notes|default:'' }}</textarea></div>
    <div style="display:flex;gap:0.75rem">
      <button type="submit" class="btn btn-primary">{{ action }} Session</button>
      <a href="{% url 'sessions_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
